<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Royal Streams</title>
  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }
    a { text-decoration: none; color: white; }

    /* LOADING */
    #loading {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 999;
    }
    #loading img { width: 220px; }

    /* LOGIN */
    #login {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 998;
    }
    input {
      width: 280px;
      padding: 12px;
      margin: 8px;
      border: none;
      border-radius: 6px;
      background: #1a1a1a;
      color: white;
    }
    button {
      padding: 12px 30px;
      margin: 8px;
      border: none;
      background: #e50914;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    /* SIDEBAR */
    #sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 90px;
      height: 100%;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
      transition: width 0.3s;
      z-index: 100;
    }
    #sidebar:hover { width: 220px; }

    .menu-item {
      width: 100%;
      padding: 16px 0;
      text-align: center;
      cursor: pointer;
    }
    .menu-item:hover { background: #1c1c1c; }

    /* MAIN */
    #main {
      margin-left: 90px;
      min-height: 100vh;
      padding-bottom: 80px;
      overflow-y: auto;
    }

    #banner {
      height: 420px;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: flex-end;
      padding: 40px;
      position: relative;
      transition: background-image 1.2s ease-in-out;
    }
    #banner h1 {
      font-size: 48px;
      margin: 0;
      text-shadow: 0 2px 8px #000;
    }

    .row { margin: 40px 0 20px; }
    .row h2 { margin-left: 20px; margin-bottom: 12px; font-size: 22px; }
    .row-content {
      display: flex;
      overflow-x: auto;
      padding: 0 20px 20px;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .card {
      min-width: 180px;
      position: relative;
      cursor: pointer;
      transition: transform 0.25s ease;
    }
    .card:hover { transform: scale(1.08); z-index: 10; }
    .card img {
      width: 100%;
      border-radius: 8px;
      display: block;
    }
    .card-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      padding: 12px 10px 8px;
      border-radius: 0 0 8px 8px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .card:hover .card-info { opacity: 1; }
    .card-title { margin: 0; font-size: 15px; }
    .card-meta { font-size: 13px; color: #ccc; }

    .skeleton {
      min-width: 180px;
      height: 270px;
      background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .modal-content {
      background: #111;
      border-radius: 12px;
      max-width: 720px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 32px;
      cursor: pointer;
      color: #aaa;
      z-index: 1;
    }
    .modal-backdrop {
      background-size: cover;
      background-position: center;
      height: 380px;
      position: relative;
    }
    .modal-backdrop::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 30%, #111 80%);
    }
    .modal-info { padding: 24px; }

    #profiles {
      position: fixed;
      inset: 0;
      background: #000;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 997;
    }
    .profile-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; margin-bottom: 20px; }
    .profile { text-align: center; cursor: pointer; }
    .profile img {
      width: 120px;
      border-radius: 12px;
      margin-bottom: 8px;
      border: 3px solid transparent;
      transition: border-color 0.2s;
    }
    .profile:hover img { border-color: #e50914; }

    @media (max-width: 768px) {
      #sidebar {
        left: auto; right: 0; top: auto; bottom: 0;
        width: 100%; height: 70px;
        flex-direction: row; justify-content: space-around;
        padding: 0; align-items: center;
      }
      #main { margin-left: 0; margin-bottom: 70px; padding-bottom: 90px; }
      #banner { height: 280px; padding: 20px; }
      #banner h1 { font-size: 32px; }
      .card { min-width: 140px; }
    }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <img src="https://i.ibb.co/BHCjN0MC/file-000000008c8c71f5a6004d429aa18c80.png" alt="Royal Streams">
</div>

<!-- LOGIN -->
<div id="login">
  <h2>Entrar</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
  <button onclick="register()">Criar Conta</button>
</div>

<!-- PERFIS -->
<div id="profiles">
  <h2>Quem está assistindo?</h2>
  <div class="profile-list" id="profileList"></div>
  <button onclick="addProfile()">+ Adicionar Perfil</button>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="menu-item">Início</div>
  <div class="menu-item">Filmes</div>
  <div class="menu-item">Séries</div>
  <div class="menu-item">Animes</div>
  <div class="menu-item">TV</div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="banner">
    <h1 id="bannerTitle"></h1>
  </div>

  <div class="row">
    <h2>Populares</h2>
    <div class="row-content" id="popular"></div>
  </div>

  <div class="row">
    <h2>Filmes</h2>
    <div class="row-content" id="movies"></div>
  </div>

  <div class="row">
    <h2>Séries</h2>
    <div class="row-content" id="series"></div>
  </div>

  <div class="row">
    <h2>Continue Assistindo</h2>
    <div class="row-content" id="continue"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal" onclick="if(event.target===this) closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <span class="modal-close" onclick="closeModal()">×</span>
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-info">
      <h2 id="modalTitle"></h2>
      <p id="modalOverview"></p>
      <p><strong>Data:</strong> <span id="modalDate"></span></p>
      <p><strong>Nota:</strong> <span id="modalRating"></span></p>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import {
    getDatabase,
    ref,
    set,
    get,
    child
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAyH7q3GOeFq5B_m8kDnxCJ0N14xYiBkEc",
    authDomain: "royal-streams-web.firebaseapp.com",
    databaseURL: "https://royal-streams-web-default-rtdb.firebaseio.com",
    projectId: "royal-streams-web",
    storageBucket: "royal-streams-web.firebasestorage.app",
    messagingSenderId: "239998986476",
    appId: "1:239998986476:web:8a2e9942aafa180bdcddc9",
    measurementId: "G-H74918T0SV"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  // ── AUTH ──────────────────────────────────────────
  window.login = () => {
    const email = document.getElementById("email").value;
    const pass  = document.getElementById("password").value;
    signInWithEmailAndPassword(auth, email, pass)
      .catch(err => alert("Erro ao entrar: " + err.message));
  };

  window.register = () => {
    const email = document.getElementById("email").value;
    const pass  = document.getElementById("password").value;
    createUserWithEmailAndPassword(auth, email, pass)
      .catch(err => alert("Erro ao criar conta: " + err.message));
  };

  onAuthStateChanged(auth, (user) => {
    document.getElementById("loading").style.display = "none";
    if (user) {
      document.getElementById("login").style.display = "none";
      document.getElementById("profiles").style.display = "flex";
      loadProfilesFromFirebase(user.uid);
    } else {
      document.getElementById("login").style.display = "flex";
    }
  });

  // ── PERFIS ────────────────────────────────────────
  async function loadProfilesFromFirebase(uid) {
    const list = document.getElementById("profileList");
    list.innerHTML = "";

    try {
      const snapshot = await get(child(ref(db), `users/${uid}/profiles`));
      let profiles = [];

      if (snapshot.exists()) {
        profiles = snapshot.val() || [];
      } else {
        profiles = [{ name: "Usuário", id: "default" }];
        await saveProfilesToFirebase(uid, profiles);
      }

      profiles.forEach((profile) => {
        const div = document.createElement("div");
        div.className = "profile";
        div.innerHTML = `
          <img src="https://i.pravatar.cc/150?u=${encodeURIComponent(profile.name)}" alt="${profile.name}">
          <p>${profile.name}</p>
        `;
        div.onclick = () => {
          document.getElementById("profiles").style.display = "none";
          loadPopular();
          loadMovies();
          loadSeries();
        };
        list.appendChild(div);
      });
    } catch (err) {
      console.error("Erro ao carregar perfis:", err);
      alert("Não foi possível carregar os perfis.");
    }
  }

  async function saveProfilesToFirebase(uid, profiles) {
    try {
      await set(ref(db, `users/${uid}/profiles`), profiles);
    } catch (err) {
      console.error("Erro ao salvar perfis:", err);
      alert("Erro ao salvar perfil.");
    }
  }

  window.addProfile = async () => {
    const name = prompt("Nome do perfil:");
    if (!name) return;

    const user = auth.currentUser;
    if (!user) return alert("Faça login primeiro!");

    try {
      const snapshot = await get(child(ref(db), `users/${user.uid}/profiles`));
      let profiles = snapshot.exists() ? snapshot.val() : [];
      profiles.push({ name, id: Date.now().toString() });
      await saveProfilesToFirebase(user.uid, profiles);
      loadProfilesFromFirebase(user.uid);
    } catch (err) {
      console.error(err);
    }
  };

  // ── TMDB ──────────────────────────────────────────
  const API    = "https://api.themoviedb.org/3";
  const KEY    = "9d626fa8d613075c71d0b0f302cb26ba";
  const IMG    = "https://image.tmdb.org/t/p/w500";
  const IMG_BG = "https://image.tmdb.org/t/p/original";

  let popularMovies = [];

  async function loadPopular() {
    document.getElementById("popular").innerHTML = '<div class="skeleton"></div>'.repeat(8);
    try {
      const res  = await fetch(`${API}/movie/popular?api_key=${KEY}&language=pt-BR`);
      const data = await res.json();
      popularMovies = data.results.slice(0, 10);
      show(popularMovies, "popular");
      if (popularMovies.length) bannerRotate();
    } catch (e) { console.error(e); }
  }

  async function loadMovies() {
    document.getElementById("movies").innerHTML = '<div class="skeleton"></div>'.repeat(8);
    try {
      const res  = await fetch(`${API}/discover/movie?api_key=${KEY}&language=pt-BR`);
      const data = await res.json();
      show(data.results, "movies");
    } catch (e) { console.error(e); }
  }

  async function loadSeries() {
    document.getElementById("series").innerHTML = '<div class="skeleton"></div>'.repeat(8);
    try {
      const res  = await fetch(`${API}/discover/tv?api_key=${KEY}&language=pt-BR`);
      const data = await res.json();
      show(data.results, "series", true);
    } catch (e) { console.error(e); }
  }

  function show(list, id, isTv = false) {
    const row = document.getElementById(id);
    row.innerHTML = "";
    list.forEach(item => {
      const div = document.createElement("div");
      div.className = "card";
      const poster = item.poster_path ? IMG + item.poster_path : "https://via.placeholder.com/180x270?text=Sem+Imagem";
      div.innerHTML = `
        <img loading="lazy" src="${poster}" alt="${item.title || item.name}">
        <div class="card-info">
          <p class="card-title">${item.title || item.name}</p>
          <p class="card-meta">${(item.release_date || item.first_air_date || "").slice(0,4) || "—"} &bull; ★ ${item.vote_average ? item.vote_average.toFixed(1) : "—"}</p>
        </div>
      `;
      div.onclick = () => openModal(item, isTv);
      row.appendChild(div);
    });
  }

  // ── BANNER ROTATIVO ───────────────────────────────
  let bannerIndex = 0;
  let bannerTimer = null;

  function bannerRotate() {
    if (!popularMovies.length) return;
    if (bannerTimer) clearInterval(bannerTimer);

    const banner = document.getElementById("banner");
    const title  = document.getElementById("bannerTitle");

    const update = () => {
      const movie = popularMovies[bannerIndex];
      if (movie.backdrop_path) {
        banner.style.backgroundImage = `url(${IMG_BG + movie.backdrop_path})`;
      }
      title.innerText = movie.title;
      bannerIndex = (bannerIndex + 1) % Math.min(5, popularMovies.length);
    };

    update();
    bannerTimer = setInterval(update, 8000);
  }

  // ── MODAL ─────────────────────────────────────────
  function openModal(item, isTv = false) {
    const bg = item.backdrop_path || item.poster_path || "";
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalBackdrop").style.backgroundImage = `url(${IMG_BG + bg})`;
    document.getElementById("modalTitle").textContent    = item.title || item.name;
    document.getElementById("modalOverview").textContent = item.overview || "Sem sinopse disponível.";
    document.getElementById("modalDate").textContent     = (item.release_date || item.first_air_date || "—").slice(0,10);
    document.getElementById("modalRating").textContent   = item.vote_average ? item.vote_average.toFixed(1) + "/10" : "—";
  }

  window.closeModal = () => {
    document.getElementById("modal").style.display = "none";
  };
</script>
</body>
</html>
