<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Royal Streams</title>
<link rel="manifest" href="data:application/json,{%22name%22:%22Royal+Streams%22,%22short_name%22:%22Royal%22,%22display%22:%22standalone%22,%22background_color%22:%22%23080808%22,%22theme_color%22:%22%23080808%22,%22icons%22:[{%22src%22:%22https://i.ibb.co/vfbZP0R/file-00000000bb74720e9f2d3864d478e87f.png%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22}]}">
<meta name="theme-color" content="#06080f">
<link rel="icon" type="image/png" href="https://i.ibb.co/vfbZP0R/file-00000000bb74720e9f2d3864d478e87f.png">
<link rel="apple-touch-icon" href="https://i.ibb.co/vfbZP0R/file-00000000bb74720e9f2d3864d478e87f.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Royal Streams">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
/* ══════════════════════════════
   CSS VARIABLES — ROYAL PALETTE
══════════════════════════════ */
:root{
  --gold:#c9a227;--gold-light:#e8c456;--gold-dark:#a07d14;
  --gold-hover:#dbb535;
  --red:#c8102e;--red-hover:#e8192e;
  --accent:var(--gold);--accent-hover:var(--gold-hover);

  --bg:#06080f;--bg2:#090c15;--bg3:#0e1220;--bg4:#131828;
  --text:#fff;--muted:#8892a4;--muted2:#3d4a5c;
  --border:rgba(255,255,255,.06);
  --glass:rgba(255,255,255,.03);--glass2:rgba(255,255,255,.07);

  --shadow-gold:rgba(201,162,39,.3);
  --shadow-red:rgba(200,16,46,.35);

  --radius:16px;--radius-sm:12px;--radius-xs:8px;

  --font-display:'Cinzel',serif;
  --font-body:'Outfit',sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  overflow-x:hidden;
  min-height:100vh;
  background-image:
    radial-gradient(ellipse 140% 70% at 50% -5%,#0c0e1e 0%,transparent 60%),
    radial-gradient(ellipse 80% 40% at 100% 80%,rgba(201,162,39,.03) 0%,transparent 55%);
}

body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  opacity:.018;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px;
}

::selection{background:rgba(201,162,39,.3);color:#fff}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(201,162,39,.3);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--gold)}

/* ══════════════════════════════
   SPLASH SCREEN
══════════════════════════════ */
#splashScreen{
  position:fixed;inset:0;z-index:99999;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
  transition:opacity .6s ease,visibility .6s ease;
}
#splashScreen.hide{opacity:0;visibility:hidden;pointer-events:none}
.splash-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(201,162,39,.08) 0%,transparent 70%);
}
.splash-inner{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  gap:0;width:100%;max-width:400px;padding:0 32px;
}
.splash-logo{
  width:220px;max-width:65vw;margin-bottom:40px;
  animation:splashLogoIn 1s cubic-bezier(.16,1,.3,1) both, splashGlow 2.5s ease-in-out .8s infinite;
  filter:drop-shadow(0 0 32px rgba(201,162,39,.25));
}
@keyframes splashGlow{
  0%,100%{filter:drop-shadow(0 0 24px rgba(201,162,39,.3))}
  50%{filter:drop-shadow(0 0 56px rgba(201,162,39,.6)) brightness(1.08)}
}
@keyframes splashLogoIn{
  from{opacity:0;transform:scale(.8) translateY(20px)}
  to{opacity:1;transform:none}
}
.splash-bar-wrap{width:100%;margin-bottom:24px}
.splash-bar{width:100%;height:2px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.splash-bar-fill{
  height:100%;width:0%;
  background:linear-gradient(to right,var(--gold-dark),var(--gold-light));
  border-radius:3px;
  transition:width .15s linear;
  box-shadow:0 0 10px rgba(201,162,39,.5);
}
.splash-text{
  font-family:var(--font-display);
  font-size:11px;letter-spacing:4px;
  color:rgba(255,255,255,.35);
  text-transform:uppercase;
}

/* ══════════════════════════════
   HEADER
══════════════════════════════ */
#appHeader{
  position:fixed;top:0;left:0;right:0;z-index:500;
  height:60px;
  display:flex;align-items:center;gap:12px;
  padding:0 16px;
  background:linear-gradient(180deg,rgba(6,8,15,.97) 0%,rgba(6,8,15,.8) 100%);
  border-bottom:1px solid rgba(255,255,255,.05);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}

#menuBtn{
  width:36px;height:36px;border-radius:50%;
  background:var(--glass2);
  border:1px solid var(--border);
  color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;
  flex-shrink:0;font-size:18px;
}
#menuBtn:hover{background:rgba(201,162,39,.12);border-color:rgba(201,162,39,.3);color:var(--gold)}

.header-logo{
  display:flex;align-items:center;gap:6px;
  font-family:var(--font-display);
  font-size:14px;letter-spacing:4px;
  text-decoration:none;flex-shrink:0;
}
.header-logo img{height:28px;width:auto}
.logo-royal{
  background:linear-gradient(135deg,var(--gold-light),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.logo-streams{color:rgba(255,255,255,.5)}

.header-search{
  flex:1;max-width:320px;margin-left:auto;
  position:relative;display:flex;align-items:center;
}
.header-search svg{
  position:absolute;left:11px;
  color:var(--muted2);pointer-events:none;
}
#search{
  width:100%;padding:8px 12px 8px 36px;
  background:var(--glass2);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text);
  font-family:var(--font-body);font-size:13px;
  outline:none;transition:all .25s;
}
#search::placeholder{color:var(--muted2)}
#search:focus{border-color:rgba(201,162,39,.3);background:rgba(255,255,255,.05);box-shadow:0 0 0 3px rgba(201,162,39,.07)}

/* ══════════════════════════════
   SIDE MENU
══════════════════════════════ */
#menuOverlay{
  position:fixed;inset:0;z-index:700;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(4px);
  opacity:0;visibility:hidden;
  transition:all .3s;
}
#menuOverlay.show{opacity:1;visibility:visible}

#menu{
  position:fixed;left:-280px;top:0;
  width:260px;height:100%;
  background:linear-gradient(160deg,rgba(10,12,22,.99),rgba(7,9,19,.99));
  border-right:1px solid rgba(201,162,39,.1);
  transition:.35s cubic-bezier(.4,0,.2,1);
  z-index:800;
  display:flex;flex-direction:column;
  box-shadow:20px 0 60px rgba(0,0,0,.7);
  padding-top:0;
}
#menu.open{left:0}

.menu-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px;
  border-bottom:1px solid rgba(255,255,255,.06);
  flex-shrink:0;
}
.menu-logo{
  font-family:var(--font-display);font-size:13px;letter-spacing:4px;
  display:flex;gap:4px;
}
.menu-close{
  width:30px;height:30px;border-radius:50%;
  background:var(--glass);border:1px solid var(--border);
  color:var(--muted);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;
}
.menu-close:hover{background:rgba(200,16,46,.2);border-color:rgba(200,16,46,.4);color:#fff}

.menu-section{padding:10px 0}
.menu-label{
  padding:8px 20px 4px;
  font-size:9px;font-weight:700;letter-spacing:3px;
  color:rgba(201,162,39,.5);text-transform:uppercase;
}

.menu-item{
  display:flex;align-items:center;gap:12px;
  padding:13px 20px;
  color:rgba(255,255,255,.6);
  cursor:pointer;transition:all .2s;
  font-size:14px;font-weight:500;
  border-left:2px solid transparent;
  text-decoration:none;
}
.menu-item:hover,.menu-item.active{
  background:rgba(201,162,39,.06);
  color:#fff;
  border-left-color:var(--gold);
  padding-left:22px;
}
.menu-item svg{flex-shrink:0;color:var(--muted)}
.menu-item:hover svg,.menu-item.active svg{color:var(--gold)}

/* ══════════════════════════════
   MAIN CONTENT
══════════════════════════════ */
#appMain{
  padding-top:70px;
  padding-bottom:30px;
  position:relative;z-index:1;
  min-height:100vh;
}

.section-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 20px 12px;
}
.section-title{
  font-family:var(--font-display);
  font-size:13px;letter-spacing:3px;
  background:linear-gradient(135deg,var(--gold-light),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-transform:uppercase;
}
.section-count{
  font-size:11px;color:var(--muted2);
  background:var(--glass);border:1px solid var(--border);
  padding:2px 8px;border-radius:20px;
}

/* ══════════════════════════════
   CAROUSEL / ROWS
══════════════════════════════ */
.row{
  margin-bottom:36px;
  position:relative;
}

.carousel{
  display:flex;
  overflow-x:auto;
  scroll-behavior:smooth;
  padding:4px 16px 12px;
  gap:10px;
  scrollbar-width:none;
}
.carousel::-webkit-scrollbar{display:none}

/* ══════════════════════════════
   CARDS
══════════════════════════════ */
.card{
  min-width:150px;
  flex-shrink:0;
  background:var(--bg3);
  border-radius:var(--radius-sm);
  overflow:hidden;
  cursor:pointer;
  border:1px solid var(--border);
  transition:all .25s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.card:hover{
  transform:translateY(-4px) scale(1.02);
  border-color:rgba(201,162,39,.3);
  box-shadow:0 16px 40px rgba(0,0,0,.6),0 0 0 1px rgba(201,162,39,.1);
}
.card-img-wrap{
  position:relative;width:100%;
  height:110px;overflow:hidden;
  background:var(--bg4);
}
.card img{
  width:100%;height:100%;
  object-fit:cover;
  transition:transform .35s;
  display:block;
}
.card:hover img{transform:scale(1.06)}

.card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(6,8,15,.9) 0%,transparent 50%);
  opacity:0;transition:opacity .25s;
  display:flex;align-items:center;justify-content:center;
}
.card:hover .card-overlay{opacity:1}
.card-play-icon{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold-dark));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 20px rgba(201,162,39,.5);
  transform:scale(.8);transition:transform .2s;
}
.card:hover .card-play-icon{transform:scale(1)}

.card-info{padding:8px 10px 10px}
.card-name{
  font-size:12px;font-weight:500;
  color:rgba(255,255,255,.8);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.4;
}

/* Skeleton loader */
.card-skeleton .card-img-wrap{
  background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
}
.card-skeleton .card-name{
  height:10px;border-radius:4px;width:80%;
  background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ══════════════════════════════
   PLAYER BOX
══════════════════════════════ */
#playerBox{
  position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(180deg,#0a0c18 0%,#06080f 100%);
  border-top:1px solid rgba(201,162,39,.15);
  display:none;z-index:600;
  box-shadow:0 -20px 60px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.03) inset;
  animation:slideUp .3s cubic-bezier(.16,1,.3,1);
}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:none;opacity:1}}

.player-header{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px 6px;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.player-logo{
  font-family:var(--font-display);font-size:11px;letter-spacing:4px;
  display:flex;gap:3px;flex-shrink:0;
}
.player-title{
  flex:1;font-size:13px;font-weight:500;
  color:rgba(255,255,255,.8);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.player-close{
  width:30px;height:30px;border-radius:50%;
  background:var(--glass);border:1px solid var(--border);
  color:var(--muted);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;flex-shrink:0;
}
.player-close:hover{background:rgba(200,16,46,.2);border-color:rgba(200,16,46,.4);color:#fff}

#video{
  width:100%;height:220px;
  background:#000;display:block;
}

/* ══════════════════════════════
   MINI PLAYER
══════════════════════════════ */
#miniPlayer{
  position:fixed;bottom:90px;right:14px;
  width:160px;
  border-radius:var(--radius-sm);
  border:1px solid rgba(201,162,39,.25);
  display:none;
  box-shadow:0 8px 32px rgba(0,0,0,.7),0 0 20px rgba(201,162,39,.1);
  overflow:hidden;
  z-index:601;
}

/* ══════════════════════════════
   EMPTY STATE
══════════════════════════════ */
.empty-state{
  display:flex;flex-direction:column;align-items:center;
  padding:60px 20px;gap:12px;
}
.empty-icon{
  width:56px;height:56px;border-radius:50%;
  background:rgba(201,162,39,.06);border:1px solid rgba(201,162,39,.15);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:4px;
}
.empty-title{
  font-family:var(--font-display);font-size:13px;
  letter-spacing:2px;color:rgba(255,255,255,.4);
}
.empty-sub{font-size:13px;color:var(--muted2);text-align:center;max-width:260px}

/* ══════════════════════════════
   BOTTOM NAV (MOBILE)
══════════════════════════════ */
#bottomNav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(6,8,15,.97);
  border-top:1px solid rgba(255,255,255,.07);
  z-index:400;
  padding:8px 0 calc(10px + env(safe-area-inset-bottom));
  backdrop-filter:blur(20px);
}
.bottom-nav-items{display:flex;justify-content:space-around}
.bottom-nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:4px 10px;cursor:pointer;
  color:var(--muted2);transition:color .2s;flex:1;
}
.bottom-nav-item.active{color:var(--gold)}
.bottom-nav-item svg{width:20px;height:20px}
.bottom-nav-label{font-size:10px;font-weight:500;letter-spacing:.3px}

/* ══════════════════════════════
   TOAST
══════════════════════════════ */
#toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(10,12,24,.97);
  border:1px solid rgba(201,162,39,.25);
  color:rgba(255,255,255,.85);
  padding:10px 20px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:500;
  z-index:9000;
  opacity:0;pointer-events:none;
  transition:all .3s cubic-bezier(.16,1,.3,1);
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══════════════════════════════
   LOADING
══════════════════════════════ */
#loading{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.88);z-index:9999;
  justify-content:center;align-items:center;
  backdrop-filter:blur(12px);
}
#loading.show{display:flex}
.spinner-wrap{display:flex;flex-direction:column;align-items:center;gap:20px}
.spinner{width:52px;height:52px;position:relative}
.spinner::before,.spinner::after{content:'';position:absolute;border-radius:50%}
.spinner::before{inset:0;border:2px solid rgba(201,162,39,.1);border-top-color:var(--gold);animation:spin .9s linear infinite}
.spinner::after{inset:8px;border:2px solid rgba(201,162,39,.15);border-bottom-color:var(--gold-light);animation:spin .6s linear infinite reverse}
.spinner-text{
  font-family:var(--font-display);font-size:11px;letter-spacing:5px;
  background:linear-gradient(135deg,var(--gold-light),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  opacity:.8;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══════════════════════════════
   RESPONSIVE
══════════════════════════════ */
@media(max-width:768px){
  .header-search{max-width:180px}
  #bottomNav{display:block}
  #appMain{padding-bottom:80px}
  .card{min-width:130px}
  .card-img-wrap{height:90px}
  #playerBox{bottom:60px}
  #miniPlayer{bottom:140px}
}
@media(max-width:480px){
  .header-search{display:none}
  #appMain{padding-top:68px}
}
</style>
</head>

<body>

<!-- SPLASH SCREEN -->
<div id="splashScreen">
  <div class="splash-bg"></div>
  <div class="splash-inner">
    <img class="splash-logo" src="https://i.ibb.co/vfbZP0R/file-00000000bb74720e9f2d3864d478e87f.png" alt="Royal Streams">
    <div class="splash-bar-wrap">
      <div class="splash-bar"><div class="splash-bar-fill" id="splashFill"></div></div>
    </div>
    <div class="splash-text">Carregando catálogo...</div>
  </div>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="spinner-wrap">
    <div class="spinner"></div>
    <div class="spinner-text">CARREGANDO</div>
  </div>
</div>

<!-- MENU OVERLAY -->
<div id="menuOverlay" onclick="fecharMenu()"></div>

<!-- SIDE MENU -->
<div id="menu">
  <div class="menu-header">
    <div class="menu-logo">
      <span class="logo-royal">ROYAL</span>
      <span class="logo-streams">STREAMS</span>
    </div>
    <div class="menu-close" onclick="fecharMenu()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
  </div>
  <div class="menu-section">
    <div class="menu-label">Catálogo</div>
    <div class="menu-item active" id="nav-todos" onclick="mostrar('todos')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Início
    </div>
    <div class="menu-item" id="nav-filmes" onclick="mostrar('filmes')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>
      Filmes
    </div>
    <div class="menu-item" id="nav-series" onclick="mostrar('series')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
      Séries
    </div>
    <div class="menu-item" id="nav-animes" onclick="mostrar('animes')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      Animes
    </div>
    <div class="menu-item" id="nav-animestv" onclick="mostrar('animestv')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
      Animes TV
    </div>
    <div class="menu-item" id="nav-tv" onclick="mostrar('tv')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 6l5 5 6-6 6 6 5-5"/><rect x="1" y="10" width="22" height="12" rx="2"/></svg>
      TV ao Vivo
    </div>
  </div>
</div>

<!-- HEADER -->
<header id="appHeader">
  <div id="menuBtn" onclick="toggleMenu()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </div>
  <a class="header-logo" href="#">
    <img src="https://i.ibb.co/vfbZP0R/file-00000000bb74720e9f2d3864d478e87f.png" alt="Royal Streams">
    <span class="logo-royal">ROYAL</span>
    <span class="logo-streams">STREAMS</span>
  </a>
  <div class="header-search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search" placeholder="Buscar filmes, séries..." autocomplete="off">
  </div>
</header>

<!-- MAIN -->
<main id="appMain">
  <div id="conteudo"></div>
</main>

<!-- PLAYER -->
<div id="playerBox">
  <div class="player-header">
    <div class="player-logo">
      <span class="logo-royal">ROYAL</span>
      <span class="logo-streams" style="color:rgba(255,255,255,.4)">STREAMS</span>
    </div>
    <div class="player-title" id="playerTitle">—</div>
    <div class="player-close" onclick="fecharPlayer()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
  </div>
  <video id="video" controls autoplay playsinline></video>
</div>

<!-- MINI PLAYER -->
<video id="miniPlayer" muted playsinline controls></video>

<!-- BOTTOM NAV (MOBILE) -->
<div id="bottomNav">
  <div class="bottom-nav-items">
    <div class="bottom-nav-item active" onclick="mostrar('todos')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span class="bottom-nav-label">Início</span>
    </div>
    <div class="bottom-nav-item" onclick="mostrar('filmes')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
      <span class="bottom-nav-label">Filmes</span>
    </div>
    <div class="bottom-nav-item" onclick="mostrar('series')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>
      <span class="bottom-nav-label">Séries</span>
    </div>
    <div class="bottom-nav-item" onclick="mostrar('tv')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 6l5 5 6-6 6 6 5-5"/><rect x="1" y="10" width="22" height="12" rx="2"/></svg>
      <span class="bottom-nav-label">TV</span>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
/* ══════════════════════════════
   SPLASH
══════════════════════════════ */
let splashProgress = 0;
const splashFill = document.getElementById('splashFill');
const splashInterval = setInterval(() => {
  splashProgress = Math.min(splashProgress + Math.random() * 12, 90);
  splashFill.style.width = splashProgress + '%';
}, 180);

function finalizarSplash() {
  clearInterval(splashInterval);
  splashFill.style.width = '100%';
  setTimeout(() => {
    document.getElementById('splashScreen').classList.add('hide');
  }, 500);
}

/* ══════════════════════════════
   MENU
══════════════════════════════ */
function toggleMenu() {
  document.getElementById('menu').classList.toggle('open');
  document.getElementById('menuOverlay').classList.toggle('show');
}
function fecharMenu() {
  document.getElementById('menu').classList.remove('open');
  document.getElementById('menuOverlay').classList.remove('show');
}

/* ══════════════════════════════
   INDEXEDDB
══════════════════════════════ */
let db;
const request = indexedDB.open('royalDB', 1);
request.onupgradeneeded = e => {
  db = e.target.result;
  db.createObjectStore('catalogo');
};
request.onsuccess = e => {
  db = e.target.result;
  carregarCache();
};

/* ══════════════════════════════
   CATÁLOGO
══════════════════════════════ */
let catalogo = { filmes:[], series:[], animes:[], animestv:[], tv:[] };
let categoriaAtual = 'todos';

function detectarCategoria(nome, grupo) {
  const t = (nome + ' ' + grupo).toLowerCase();
  if (t.includes('anime-tv') || t.includes('anime tv')) return 'animestv';
  if (t.includes('anime')) return 'animes';
  if (t.includes('s01') || t.includes('episodio') || t.includes('ep')) return 'series';
  if (t.includes('filme') || t.includes('movie')) return 'filmes';
  return 'tv';
}

async function carregarLista() {
  try {
    const txt = await fetch('lista.m3u').then(r => r.text());
    parseM3U(txt);
  } catch(e) {
    finalizarSplash();
    mostrarToast('lista.m3u não encontrada');
  }
}

function parseM3U(text) {
  const linhas = text.split('\n');
  for (let i = 0; i < linhas.length; i++) {
    if (linhas[i].includes('#EXTINF')) {
      const linha = linhas[i];
      const nome = (linha.split(',')[1] || '').trim();
      const g = linha.match(/group-title="([^"]+)"/);
      const grupo = g ? g[1] : '';
      const logo = linha.match(/tvg-logo="([^"]+)"/);
      const imgUrl = logo ? logo[1] : '';
      const url = (linhas[i+1] || '').trim();
      const cat = detectarCategoria(nome, grupo);
      if (nome && url) catalogo[cat].push({ nome, url, img: imgUrl });
    }
  }
  salvarCache();
  renderHome();
  finalizarSplash();
}

/* ══════════════════════════════
   CACHE
══════════════════════════════ */
function salvarCache() {
  const tx = db.transaction('catalogo', 'readwrite');
  tx.objectStore('catalogo').put(catalogo, 'data');
}

function carregarCache() {
  const tx = db.transaction('catalogo', 'readonly');
  const req = tx.objectStore('catalogo').get('data');
  req.onsuccess = () => {
    if (req.result) {
      catalogo = req.result;
      renderHome();
    }
    carregarLista();
  };
}

/* ══════════════════════════════
   RENDER
══════════════════════════════ */
function renderHome() {
  const conteudo = document.getElementById('conteudo');
  if (categoriaAtual === 'todos') {
    let html = '';
    if (catalogo.filmes.length)   html += criarLinha('Filmes', catalogo.filmes);
    if (catalogo.series.length)   html += criarLinha('Séries', catalogo.series);
    if (catalogo.animes.length)   html += criarLinha('Animes', catalogo.animes);
    if (catalogo.animestv.length) html += criarLinha('Animes TV', catalogo.animestv);
    if (catalogo.tv.length)       html += criarLinha('TV ao Vivo', catalogo.tv);
    if (!html) html = emptyState('Catálogo vazio', 'Adicione uma lista.m3u para começar.');
    conteudo.innerHTML = html;
  } else {
    const lista = catalogo[categoriaAtual] || [];
    const nomes = {filmes:'Filmes',series:'Séries',animes:'Animes',animestv:'Animes TV',tv:'TV ao Vivo'};
    conteudo.innerHTML = lista.length
      ? criarLinha(nomes[categoriaAtual] || categoriaAtual, lista)
      : emptyState('Nenhum item', 'Nada encontrado nesta categoria.');
  }
}

function criarLinha(titulo, lista) {
  const n = lista.length;
  let html = `
  <div class="row">
    <div class="section-header">
      <div class="section-title">${titulo}</div>
      <div class="section-count">${n > 500 ? '500+' : n}</div>
    </div>
    <div class="carousel">`;
  lista.slice(0, 500).forEach(item => {
    const thumb = item.img || `https://placehold.co/300x180/0e1220/444444?text=...`;
    const safeUrl = item.url.replace(/'/g, "\\'");
    const safeName = item.nome.replace(/'/g, "\\'");
    html += `
    <div class="card" onclick="play('${safeUrl}','${safeName}')">
      <div class="card-img-wrap">
        <img loading="lazy" src="${thumb}" onerror="this.src='https://placehold.co/300x180/0e1220/333333?text=RS'">
        <div class="card-overlay">
          <div class="card-play-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </div>
        </div>
      </div>
      <div class="card-info">
        <div class="card-name">${item.nome}</div>
      </div>
    </div>`;
  });
  html += `</div></div>`;
  return html;
}

function emptyState(titulo, sub) {
  return `<div class="empty-state">
    <div class="empty-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(201,162,39,.6)" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
    <div class="empty-title">${titulo}</div>
    <div class="empty-sub">${sub}</div>
  </div>`;
}

/* ══════════════════════════════
   NAVEGAÇÃO
══════════════════════════════ */
function mostrar(cat) {
  categoriaAtual = cat;
  fecharMenu();
  // Nav ativo
  document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + cat);
  if (navEl) navEl.classList.add('active');
  // Bottom nav
  document.querySelectorAll('.bottom-nav-item').forEach(el => el.classList.remove('active'));
  renderHome();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ══════════════════════════════
   PLAYER
══════════════════════════════ */
let hls;

function play(url, nome) {
  const video = document.getElementById('video');
  const box = document.getElementById('playerBox');
  const titleEl = document.getElementById('playerTitle');

  box.style.display = 'block';
  if (titleEl) titleEl.textContent = nome || '—';

  if (hls) { hls.destroy(); hls = null; }

  if (Hls.isSupported() && url.includes('.m3u8')) {
    hls = new Hls({ enableWorker: true });
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
    hls.on(Hls.Events.ERROR, (e, d) => { if (d.fatal) mostrarToast('Erro ao carregar stream'); });
  } else if (video.canPlayType('application/vnd.apple.mpegurl') && url.includes('.m3u8')) {
    video.src = url;
    video.play().catch(()=>{});
  } else {
    video.src = url;
    video.play().catch(()=>{});
  }

  video.onerror = () => mostrarToast('URL inválida ou sem suporte');
}

function fecharPlayer() {
  const video = document.getElementById('video');
  if (hls) { hls.destroy(); hls = null; }
  video.pause();
  video.src = '';
  document.getElementById('playerBox').style.display = 'none';
  document.getElementById('miniPlayer').style.display = 'none';
}

/* MINI PLAYER */
const mainVideo = document.getElementById('video');
mainVideo.addEventListener('pause', () => {
  const box = document.getElementById('playerBox');
  if (box.style.display === 'none') return;
  const mini = document.getElementById('miniPlayer');
  mini.src = mainVideo.src;
  mini.style.display = 'block';
});
mainVideo.addEventListener('play', () => {
  document.getElementById('miniPlayer').style.display = 'none';
});

/* ══════════════════════════════
   BUSCA
══════════════════════════════ */
let buscaTimeout;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(buscaTimeout);
  buscaTimeout = setTimeout(() => {
    const q = e.target.value.toLowerCase().trim();
    if (!q) { renderHome(); return; }
    const res = [];
    Object.values(catalogo).forEach(lista =>
      lista.forEach(item => { if (item.nome.toLowerCase().includes(q)) res.push(item); })
    );
    const conteudo = document.getElementById('conteudo');
    conteudo.innerHTML = res.length
      ? criarLinha(`Resultados para "${e.target.value}"`, res)
      : emptyState('Sem resultados', `Nenhum item encontrado para "${e.target.value}"`);
  }, 300);
});

/* ══════════════════════════════
   TOAST
══════════════════════════════ */
let toastTimer;
function mostrarToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>

</body>
</html>
